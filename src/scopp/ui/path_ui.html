<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SCoPP 경로 할당 검사기</title><style>__STYLE__</style></head>
<body><header><div><h1>SCoPP 경로 할당 검사기</h1><p id="subtitle"></p></div><span class="badge">결정적 실행</span></header><main><section class="panel map-wrap"><div class="toolbar">
<button id="play" data-testid="play">▶ 재생</button><button id="reset" data-testid="reset">↺ 초기화</button><label>속도 <select id="speed"><option value="0.025">느림</option><option value="0.06" selected>보통</option><option value="0.14">빠름</option></select></label><label><input id="showCells" type="checkbox" checked>영역</label><label><input id="showRoutes" type="checkbox" checked>경로</label><label><input id="showNoFly" type="checkbox" checked>금지 구역</label><span class="spacer"></span><span class="step" id="step">0 / 0</span></div><svg id="map" role="img" aria-label="노드별 할당 영역과 coverage path"></svg></section>
<aside><section class="panel section"><h2>실행 요약</h2><div class="metrics" id="metrics"></div></section><section class="panel section"><h2>노드별 할당</h2><div id="nodes"></div></section><section class="panel section"><h2>현재 이동 상태</h2><div id="movement">재생을 시작하면 노드의 위치와 다음 목표가 표시됩니다.</div></section><section class="panel section"><h2>표시 정보</h2><div class="legend"><span class="key"><i class="swatch nofly-key"></i>no-fly</span><span class="key"><i class="swatch cursor-key"></i>현재 위치</span></div><p class="warn">기본 경로계획은 Approx Metric-TSP이며, valid cell 사이 4-neighbor 실행 경로와 no-fly 차단을 적용합니다.</p></section></aside></main>
<script>const D=__DATA__;</script><script>__SCRIPT__</script></body></html>
