<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Executable KPI Comparison</title>
  <style>:root {
  color-scheme: dark;
  --bg: #07111f;
  --panel: #0d1a2d;
  --line: #203551;
  --text: #eef6ff;
  --muted: #91a4bd;
  --blue: #38bdf8;
  --orange: #fb923c;
  --green: #4ade80;
  --pink: #fb7185;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  background: radial-gradient(circle at 50% -20%, #163453 0, #07111f 46%);
  color: var(--text);
  font: 14px/1.45 Inter, ui-sans-serif, system-ui, sans-serif;
}
header, main { max-width: 1500px; margin: auto; }
header {
  display: flex;
  justify-content: space-between;
  align-items: end;
  padding: 26px 28px 16px;
}
h1, h2, p { margin-top: 0; }
h1 { font-size: 28px; margin-bottom: 4px; }
h2 { font-size: 18px; margin-bottom: 0; }
.eyebrow {
  font-size: 11px;
  letter-spacing: .14em;
  color: #67e8f9;
  font-weight: 800;
  margin-bottom: 5px;
}
.badge, .method {
  border-radius: 99px;
  padding: 5px 9px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .08em;
}
.badge {
  background: #123b36;
  color: #99f6e4;
  border: 1px solid #24685e;
}
.method.current { background: #12314b; color: #7dd3fc; }
.method.baseline { background: #422313; color: #fdba74; }
.panel {
  background: linear-gradient(180deg, #102039ee, #0a1729ee);
  border: 1px solid var(--line);
  border-radius: 16px;
  box-shadow: 0 20px 60px #0005;
}
.controls {
  margin: 0 28px 14px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.controls label {
  display: flex;
  align-items: center;
  gap: 7px;
  color: #c9d7e8;
}
.controls select {
  background: #0b1729;
  border: 1px solid #315071;
  color: var(--text);
  padding: 8px 10px;
  border-radius: 9px;
}
.callout {
  margin-left: auto;
  color: #bae6fd;
  font-size: 12px;
}
.comparison {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 0 28px;
}
.route-panel { padding: 14px; }
.panel-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.panel-title h2 { margin-top: 7px; }
.distance { text-align: right; font-size: 12px; color: var(--muted); }
.distance b { display: block; font-size: 20px; color: var(--text); }
svg {
  width: 100%;
  height: 460px;
  background: #07101d;
  border: 1px solid #1b304b;
  border-radius: 12px;
}
.aoi { fill: #0d1a2c; stroke: #d7e8fc; stroke-width: .055; }
.cell { fill: #183250; stroke: #ffffff25; stroke-width: .018; }
.assigned { fill: #164e63; }
.route { fill: none; stroke: var(--blue); stroke-width: .105; stroke-linejoin: round; stroke-linecap: round; }
.route.nn { stroke: var(--orange); }
.point { stroke: #06101d; stroke-width: .07; }
.point-label {
  fill: #fff;
  font-size: .34px;
  font-weight: 800;
  paint-order: stroke;
  stroke: #07111f;
  stroke-width: .08;
}
.leg-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}
.leg {
  background: #081526;
  border: 1px solid #1b304b;
  border-radius: 10px;
  padding: 9px;
}
.leg span { display: block; color: var(--muted); font-size: 11px; }
.leg b { font-size: 16px; }
.explanation {
  margin: 14px 28px 10px;
  padding: 16px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
}
.explanation h2 { margin-bottom: 6px; }
.explanation p { margin-bottom: 0; color: #b6c6d9; }
.delta { font-size: 28px; font-weight: 900; color: #86efac; white-space: nowrap; }
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  padding: 4px 30px 24px;
  color: var(--muted);
  font-size: 12px;
}
.legend span { display: flex; align-items: center; gap: 6px; }
.legend i { display: inline-block; width: 12px; height: 12px; border-radius: 50%; }
.legend .start { background: #fff; }
.legend .first { background: var(--green); }
.legend .last { background: var(--pink); }
.legend .path { height: 3px; border-radius: 2px; background: var(--blue); }
.legend .nofly { border-radius: 2px; background: #8f1d36; }
@media (max-width: 950px) {
  .comparison { grid-template-columns: 1fr; }
  .callout { width: 100%; margin-left: 0; }
  svg { height: 390px; }
  .explanation { align-items: flex-start; flex-direction: column; }
}
</style>
</head>
<body>
  <header>
    <div>
      <p class="eyebrow">OFFICIAL_MINIBATCH EXECUTABLE COMPARISON</p>
      <h1>Approx Metric-TSP vs public-code NN</h1>
      <p id="subtitle"></p>
    </div>
    <span class="badge">grid-adjacent executable · no-fly blocked</span>
  </header>

  <main>
    <section class="controls panel">
      <label>Node <select id="nodeSelect" data-testid="node-select"></select></label>
      <div class="callout" id="orientationNote"></div>
    </section>

    <section class="comparison">
      <article class="panel route-panel">
        <div class="panel-title">
          <div>
            <span class="method current">CURRENT</span>
            <h2>Approx Metric-TSP</h2>
          </div>
          <div class="distance" id="metricDistance"></div>
        </div>
        <svg id="metricMap" role="img" aria-label="Approx Metric-TSP route"></svg>
        <div class="leg-grid" id="metricLegs"></div>
      </article>

      <article class="panel route-panel">
        <div class="panel-title">
          <div>
            <span class="method baseline">BASELINE</span>
            <h2>public-code NN</h2>
          </div>
          <div class="distance" id="nnDistance"></div>
        </div>
        <svg id="nnMap" role="img" aria-label="public-code NN route"></svg>
        <div class="leg-grid" id="nnLegs"></div>
      </article>
    </section>

    <section class="panel explanation">
      <div>
        <p class="eyebrow">EXECUTABLE KPI</p>
        <h2 id="finding"></h2>
        <p id="detail"></p>
      </div>
      <div class="delta" id="delta"></div>
    </section>

    <section class="legend">
      <span><i class="start"></i>start</span>
      <span><i class="first"></i>first cell</span>
      <span><i class="last"></i>last cell</span>
      <span><i class="path"></i>executed path</span>
      <span><i class="nofly"></i>no-fly zone</span>
    </section>
  </main>

  <script>const NS = 'http://www.w3.org/2000/svg';
const metricSvg = document.querySelector('#metricMap');
const nnSvg = document.querySelector('#nnMap');
const nodeSelect = document.querySelector('#nodeSelect');

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS(NS, tag);
  for (const [key, value] of Object.entries(attrs)) {
    el.setAttribute(key, value);
  }
  return el;
}

function formatPoint(point) {
  return `${point[0]},${-point[1]}`;
}

function distance(a, b) {
  return Math.hypot(b[0] - a[0], b[1] - a[1]);
}

function routeDistance(points) {
  return points.slice(1).reduce((sum, point, index) => sum + distance(points[index], point), 0);
}

function routeFor(node, plannerKey) {
  return plannerKey === 'metric' ? node.metric.trajectory : node.nn.trajectory;
}

function plannerMetrics(node, plannerKey) {
  const route = routeFor(node, plannerKey);
  if (route.length < 2) {
    return { approach: 0, middle: 0, return: 0, total: 0 };
  }
  return {
    approach: distance(route[0], route[1]),
    middle: route.length > 3 ? routeDistance(route.slice(1, -1)) : 0,
    return: distance(route[route.length - 2], route[route.length - 1]),
    total: routeDistance(route),
  };
}

function renderMetricCards(target, metrics) {
  target.innerHTML = [
    ['first approach', metrics.approach],
    ['middle segment', metrics.middle],
    ['final return', metrics.return],
  ].map(([label, value]) => `<div class="leg"><span>${label}</span><b>${value.toFixed(3)} m</b></div>`).join('');
}

function renderRoute(svg, node, plannerKey, isBaseline) {
  svg.innerHTML = '';
  const route = routeFor(node, plannerKey);
  const geometry = [...D.aoi, ...D.noFly.flat(), ...D.cells.flatMap((cell) => cell.vertices), ...route];
  const xs = geometry.map((point) => point[0]);
  const ys = geometry.map((point) => point[1]);
  const padding = D.cellWidth * 0.8;
  svg.setAttribute(
    'viewBox',
    `${Math.min(...xs) - padding} ${-(Math.max(...ys) + padding)} ${Math.max(...xs) - Math.min(...xs) + 2 * padding} ${Math.max(...ys) - Math.min(...ys) + 2 * padding}`,
  );

  svg.append(svgEl('polygon', { points: D.aoi.map(formatPoint).join(' '), class: 'aoi' }));

  const assignedCells = new Set(node.cellIds);
  for (const cell of D.cells) {
    svg.append(svgEl('polygon', {
      points: cell.vertices.map(formatPoint).join(' '),
      class: `cell ${assignedCells.has(cell.id) ? 'assigned' : ''}`,
    }));
  }

  for (const zone of D.noFly) {
    svg.append(svgEl('polygon', { points: zone.map(formatPoint).join(' '), class: 'nofly-area' }));
  }

  svg.append(svgEl('polyline', { points: route.map(formatPoint).join(' '), class: `route ${isBaseline ? 'nn' : ''}` }));

  const first = route[1] ?? route[0];
  const last = route.at(-2) ?? route[0];
  const markers = [
    [node.start, 'S', '#fff'],
    [first, '1', '#4ade80'],
    [last, 'L', '#fb7185'],
  ];
  for (const [point, label, fill] of markers) {
    svg.append(svgEl('circle', { cx: point[0], cy: -point[1], r: D.cellWidth * 0.2, fill, class: 'point' }));
    const text = svgEl('text', { x: point[0] + D.cellWidth * 0.18, y: -point[1] - D.cellWidth * 0.18, class: 'point-label' });
    text.textContent = label;
    svg.append(text);
  }
}

function setText(selector, text) {
  document.querySelector(selector).textContent = text;
}

function render() {
  const node = D.nodes.find((item) => item.id === nodeSelect.value);
  const metricMetrics = plannerMetrics(node, 'metric');
  const nnMetrics = plannerMetrics(node, 'nn');

  renderRoute(metricSvg, node, 'metric', false);
  renderRoute(nnSvg, node, 'nn', true);

  document.querySelector('#metricDistance').innerHTML = `selected route<b>${metricMetrics.total.toFixed(3)} m</b>`;
  document.querySelector('#nnDistance').innerHTML = `selected route<b>${nnMetrics.total.toFixed(3)} m</b>`;
  renderMetricCards(document.querySelector('#metricLegs'), metricMetrics);
  renderMetricCards(document.querySelector('#nnLegs'), nnMetrics);

  const delta = (nnMetrics.total - metricMetrics.total) / nnMetrics.total * 100;
  setText('#delta', `${delta >= 0 ? '−' : '+'}${Math.abs(delta).toFixed(2)}%`);
  setText('#finding', `Approx Metric-TSP is ${Math.abs(delta).toFixed(2)}% ${delta >= 0 ? 'shorter' : 'longer'} than NN for ${node.id}.`);
  setText('#detail', 'Comparison uses the same grid-adjacent executable model with no-fly blocking.');
  setText('#orientationNote', 'Executable comparison only.');
}

for (const node of D.nodes) {
  nodeSelect.insertAdjacentHTML('beforeend', `<option value="${node.id}" ${node.id === 'node-01' ? 'selected' : ''}>${node.id} · ${node.cells} cells</option>`);
}

setText('#subtitle', `${D.name} · ${D.cells.length} cells · seed ${D.seed} · B=${D.bias}`);
nodeSelect.addEventListener('change', render);
render();
</script>
