<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>실내 커버리지 실험 총괄</title><style>:root{color-scheme:dark;--bg:#070b16;--panel:#10182a;--line:#24304a;--text:#eff5ff;--muted:#8795b2;--green:#5eead4;--blue:#60a5fa;--amber:#fbbf24}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 90% -10%,#16355a 0,transparent 35%),var(--bg);color:var(--text);font:14px/1.5 system-ui,sans-serif}header{max-width:1200px;margin:auto;padding:34px 24px 20px;display:flex;justify-content:space-between;align-items:end}h1{font-size:34px;margin:4px 0}header p{color:var(--muted);margin:0}.eyebrow,.heading span{font-size:11px;letter-spacing:.15em;color:var(--green);font-weight:800}.commit{font-family:monospace;color:#b9c8e6;background:#10192c;border:1px solid var(--line);padding:8px 11px;border-radius:8px}main{max-width:1200px;margin:auto;padding:0 24px 40px;display:grid;gap:14px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat,.panel{background:linear-gradient(145deg,#111b2f,#0d1424);border:1px solid var(--line);border-radius:14px;box-shadow:0 14px 35px #0004}.stat{padding:16px}.stat b{font-size:25px;display:block}.stat small{color:var(--muted)}.panel{padding:18px}.heading{display:flex;justify-content:space-between;align-items:end;margin-bottom:16px}.heading h2{font-size:18px;margin:2px 0}.heading>b{color:var(--green)}.pipeline{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.stage{position:relative;padding:14px 10px;background:#0b1323;border:1px solid #273653;border-radius:10px;min-height:102px}.stage.done{border-color:#27685f}.stage .num{font:11px monospace;color:var(--muted)}.stage b{display:block;margin:8px 0 2px}.stage small{color:var(--muted)}.check{position:absolute;right:8px;top:8px;color:var(--green)}.columns{display:grid;grid-template-columns:1.25fr .75fr;gap:14px}.profile{display:grid;grid-template-columns:150px 1fr 65px;gap:10px;align-items:center;margin:11px 0}.bar{height:10px;background:#25324b;border-radius:8px;overflow:hidden}.bar i{height:100%;display:block;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:8px}.profile small{color:var(--muted)}.links{display:grid;gap:8px}.links a{display:flex;justify-content:space-between;padding:11px;text-decoration:none;color:var(--text);background:#0b1323;border:1px solid #273653;border-radius:9px}.links a:hover{border-color:var(--green)}.next{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.next-item{padding:13px;background:#0b1323;border:1px solid #273653;border-radius:10px}.next-item b{color:var(--amber)}.next-item p{color:var(--muted);margin:5px 0 0}@media(max-width:900px){.pipeline{grid-template-columns:repeat(2,1fr)}.columns{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.next{grid-template-columns:1fr}} 
</style></head><body>
<header><div><span class="eyebrow">GMALLOC · INDOOR COVERAGE</span><h1>실험 총괄 대시보드</h1><p>현재 기본 경로계획, 파이프라인 상태, 비교 실험과 산출물을 한 화면에서 확인합니다.</p></div><div class="commit" id="commit"></div></header>
<main><section class="stats" id="stats"></section><section class="panel"><div class="heading"><div><span>PIPELINE</span><h2>실험 파이프라인</h2></div><b id="completion"></b></div><div class="pipeline" id="pipeline"></div></section>
<div class="columns"><section class="panel"><div class="heading"><div><span>FIXED ROUTER</span><h2>Clustering 비교 · 동일 Approx Metric-TSP</h2></div></div><div id="profiles"></div></section><section class="panel"><div class="heading"><div><span>DELIVERABLES</span><h2>확인 가능한 산출물</h2></div></div><div class="links" id="links"></div></section></div>
<section class="panel"><div class="heading"><div><span>NEXT</span><h2>다음 검증 후보</h2></div></div><div class="next" id="next"></div></section></main>
<script>const D={"commit": "beb3569", "tests": 54, "pythonFiles": 30, "cellCount": 109, "pathProfile": "approx_metric_tsp", "profiles": [{"name": "deterministic_lloyd", "cells": [26, 28, 28, 27], "makespan": 35.73355039969029}, {"name": "official_minibatch", "cells": [23, 38, 19, 29], "makespan": 43.26578775127645}], "stages": [{"name": "맵 모델", "detail": "AOI, no-fly, Shapely", "status": "done"}, {"name": "격자화", "detail": "FoV 기반 cell 생성", "status": "done"}, {"name": "Clustering", "detail": "Lloyd / MiniBatch", "status": "done"}, {"name": "경쟁 해소", "detail": "Conflict cell 탐지", "status": "done"}, {"name": "경로계획", "detail": "Approx Metric-TSP · insertion + 2-opt", "status": "done"}, {"name": "집계", "detail": "Makespan / 경로 길이", "status": "done"}, {"name": "UI", "detail": "경로 비교 대시보드 생성", "status": "done"}], "links": [{"name": "경로 이동 UI", "href": "path_ui.html"}, {"name": "실행 기준 비교 UI", "href": "path_comparison_ui.html"}, {"name": "실행 KPI 그래프", "href": "path_planner_exec_only_v1.png"}, {"name": "KPI 요약 문서", "href": "executable_kpi_result.md"}, {"name": "README", "href": "../README.md"}], "next": [{"name": "경로 성능", "detail": "Approx Metric-TSP의 optimality gap, 2-opt local optimum 및 표준 솔버 교차 검증을 확장할 수 있습니다."}, {"name": "실내 비행", "detail": "Cell 인접 이동과 no-fly 차단을 유지한 상태에서 추가 제약을 실험할 수 있습니다."}, {"name": "검증 강화", "detail": "Seed 고정 재현성과 KPI 계산 일치성을 추가로 점검할 수 있습니다."}]};</script><script>document.querySelector('#commit').textContent=`main · ${D.commit}`;
const stats=[['테스트',`${D.tests} passed`],['기본 경로계획',D.pathProfile],['유효 Cell',D.cellCount],['Clustering Profile',D.profiles.length]];
document.querySelector('#stats').innerHTML=stats.map(x=>`<article class="stat"><b>${x[1]}</b><small>${x[0]}</small></article>`).join('');
const done=D.stages.filter(x=>x.status==='done').length;document.querySelector('#completion').textContent=`${done}/${D.stages.length} 완료`;
document.querySelector('#pipeline').innerHTML=D.stages.map((x,i)=>`<article class="stage ${x.status}"><span class="num">0${i+1}</span>${x.status==='done'?'<span class="check">●</span>':''}<b>${x.name}</b><small>${x.detail}</small></article>`).join('');
const max=Math.max(...D.profiles.map(x=>x.makespan));document.querySelector('#profiles').innerHTML=D.profiles.map(x=>`<div class="profile"><div><b>${x.name}</b><br><small>${x.cells.join(' / ')} cells</small></div><div class="bar"><i style="width:${x.makespan/max*100}%"></i></div><b>${x.makespan.toFixed(2)}m</b></div>`).join('');
document.querySelector('#links').innerHTML=D.links.map(x=>`<a href="${x.href}"><span>${x.name}</span><b>열기 ↗</b></a>`).join('');
document.querySelector('#next').innerHTML=D.next.map((x,i)=>`<article class="next-item"><b>0${i+1} · ${x.name}</b><p>${x.detail}</p></article>`).join('');
</script></body></html>
